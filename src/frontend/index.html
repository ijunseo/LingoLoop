<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🔄 LingoLoop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 400: "#a78bfa", 500: "#8b5cf6", 600: "#7c3aed" },
            ink: { 900: "#0b0f1a", 800: "#111827", 700: "#1a2233" },
          },
          fontFamily: { mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"] },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="min-h-screen bg-ink-900 text-slate-100 antialiased">
  <!-- Header -->
  <header class="sticky top-0 z-20 border-b border-white/5 bg-ink-900/80 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-5 py-4">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🔄</span>
        <div>
          <h1 class="text-lg font-bold leading-none">LingoLoop</h1>
          <p class="text-[11px] text-slate-400">Closed-Loop Learning · Zero API Cost</p>
        </div>
      </div>
      <nav class="flex gap-1 rounded-xl bg-ink-700 p-1 text-sm">
        <button data-tab="dashboard" class="tab-btn rounded-lg px-4 py-1.5 font-medium">대시보드</button>
        <button data-tab="quiz" class="tab-btn rounded-lg px-4 py-1.5 font-medium">복습</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-5 py-8">
    <!-- ============================= DASHBOARD ============================= -->
    <section id="view-dashboard" class="space-y-8">
      <!-- Stats -->
      <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">
        <div class="stat-card">
          <p class="stat-label">전체 항목</p>
          <p id="stat-total" class="stat-value">–</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">마스터</p>
          <p id="stat-mastered" class="stat-value text-emerald-400">–</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">복습 대기</p>
          <p id="stat-due" class="stat-value text-amber-400">–</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">마스터율</p>
          <p id="stat-rate" class="stat-value text-brand-400">–</p>
        </div>
      </div>

      <!-- Import -->
      <div class="rounded-2xl border border-white/5 bg-ink-800 p-6">
        <div class="mb-3 flex items-center justify-between">
          <div>
            <h2 class="text-base font-semibold">📥 데이터 주입</h2>
            <p class="text-xs text-slate-400">LLM이 뽑아준 JSON을 통째로 붙여넣으세요. 마크다운 찌꺼기는 자동 제거됩니다.</p>
          </div>
        </div>
        <textarea id="import-text" rows="8"
          class="w-full resize-y rounded-xl border border-white/10 bg-ink-900 p-4 font-mono text-sm text-slate-200 outline-none focus:border-brand-500"
          placeholder='```json&#10;[{"type":"vocabulary", ...}]&#10;```'></textarea>
        <div class="mt-3 flex items-center gap-3">
          <button id="import-btn"
            class="rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-500 active:scale-95">
            저장하기
          </button>
          <button id="sample-btn"
            class="rounded-xl border border-white/10 px-4 py-2.5 text-sm text-slate-300 transition hover:bg-white/5">
            샘플 넣기
          </button>
          <span id="import-msg" class="text-sm"></span>
        </div>
      </div>

      <!-- Start quiz CTA -->
      <div class="flex flex-col items-center gap-3 rounded-2xl border border-brand-500/20 bg-gradient-to-br from-brand-600/15 to-transparent p-8 text-center">
        <p class="text-sm text-slate-300">약점 위주로 15문제가 자동 출제됩니다.</p>
        <button id="start-quiz-btn"
          class="rounded-xl bg-white px-7 py-3 text-base font-bold text-ink-900 transition hover:bg-slate-200 active:scale-95">
          복습 시작 →
        </button>
      </div>
    </section>

    <!-- =============================== QUIZ =============================== -->
    <section id="view-quiz" class="hidden">
      <!-- Progress -->
      <div class="mb-6">
        <div class="mb-2 flex items-center justify-between text-xs text-slate-400">
          <span id="quiz-progress-label">0 / 0</span>
          <span id="quiz-type-badge" class="rounded-full bg-ink-700 px-2 py-0.5"></span>
        </div>
        <div class="h-1.5 w-full overflow-hidden rounded-full bg-ink-700">
          <div id="quiz-progress-bar" class="h-full w-0 rounded-full bg-brand-500 transition-all duration-300"></div>
        </div>
      </div>

      <!-- Question card -->
      <div id="quiz-card" class="rounded-2xl border border-white/5 bg-ink-800 p-8">
        <p id="quiz-prompt" class="mb-6 text-center text-xs uppercase tracking-widest text-slate-500"></p>

        <div id="quiz-question" class="mb-8 text-center"></div>

        <div id="quiz-options" class="grid grid-cols-1 gap-3 sm:grid-cols-2"></div>

        <div class="mt-6 flex items-center justify-between">
          <button id="tts-btn" class="flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-sm text-slate-400 transition hover:bg-white/5 hover:text-slate-200">
            🔊 다시 듣기
          </button>
          <button id="next-btn" class="hidden rounded-xl bg-brand-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-brand-500">
            다음 →
          </button>
        </div>
      </div>

      <!-- Done -->
      <div id="quiz-done" class="hidden rounded-2xl border border-emerald-500/20 bg-emerald-500/5 p-10 text-center">
        <p class="text-5xl">🎉</p>
        <h3 class="mt-4 text-xl font-bold">복습 완료!</h3>
        <p id="quiz-done-msg" class="mt-1 text-sm text-slate-400"></p>
        <button id="back-dash-btn" class="mt-6 rounded-xl bg-white px-6 py-2.5 font-semibold text-ink-900 hover:bg-slate-200">
          대시보드로
        </button>
      </div>
    </section>
  </main>

  <footer class="mx-auto max-w-5xl px-5 pb-10 text-center text-xs text-slate-600">
    generate_profile.py로 <code>learning_profile.md</code>를 뽑아 다음 대화에 주입하세요.
  </footer>

  <script src="/app.js"></script>
</body>
</html>
